    <title>Praveen P | Portfolio</title>
    <!-- Inline theme script: runs synchronously before any CSS/React so there is ZERO flash -->
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var prefersDark = window.matchMedia
            ? window.matchMedia('(prefers-color-scheme: dark)').matches
            : true;
          var isDark = saved === 'dark' || (saved === null && prefersDark);
          if (saved === 'light') isDark = false;
          document.documentElement.classList.add(isDark ? 'dark' : 'light');
          // Set bg colour immediately so over-scroll bounce areas match the theme
          document.documentElement.style.backgroundColor = isDark ? '#05070D' : '#F0F4FF';
          document.body.style.backgroundColor = isDark ? '#05070D' : '#F0F4FF';
        } catch (e) {
          document.documentElement.classList.add('dark');
          document.documentElement.style.backgroundColor = '#05070D';
        }
      })();
    </script>
  </head>
  <body>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
